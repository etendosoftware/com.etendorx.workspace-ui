name: Docker Build and Publish

on:
  push:
    branches:
      - "develop"
      - "epic/**"
    tags:
      - "*"
  pull_request:
    branches:
      - "develop"
      - "epic/**"

jobs:
  build-and-publish:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
            platform_tag: amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            platform_tag: arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Get branch name or tag name
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            # Remove 'v' prefix from tag name if it exists
            TAG_NAME="${{ github.ref_name }}"
            BRANCH_NAME="${TAG_NAME#v}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs, use the base branch (target branch) and sanitize it
            BRANCH_NAME=$(echo "${{ github.base_ref }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          elif [ "${{ github.ref_name }}" == "develop" ] && [ "${{ github.event_name }}" == "push" ]; then
            BRANCH_NAME="latest"
          elif [[ "${{ github.ref_name }}" == epic/* ]]; then
            # For epic branches, sanitize the branch name
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          else
            # For feature branches, use sanitized branch name
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          fi

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          echo "Building Docker image with tag: $BRANCH_NAME"

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: etendo/etendo_ui:${{ env.BRANCH_NAME }}-${{ matrix.platform_tag }}
          cache-from: type=gha,scope=${{ matrix.platform_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_tag }}

  merge-manifests:
    runs-on: ubuntu-latest
    needs: build-and-publish

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Get branch name or tag name
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            TAG_NAME="${{ github.ref_name }}"
            BRANCH_NAME="${TAG_NAME#v}"
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            BRANCH_NAME=$(echo "${{ github.base_ref }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          elif [ "${{ github.ref_name }}" == "develop" ] && [ "${{ github.event_name }}" == "push" ]; then
            BRANCH_NAME="latest"
          elif [[ "${{ github.ref_name }}" == epic/* ]]; then
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          else
            BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          fi

          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

      - name: Create and push multi-platform manifest
        run: |
          docker buildx imagetools create \
            --tag etendo/etendo_ui:${{ env.BRANCH_NAME }} \
            etendo/etendo_ui:${{ env.BRANCH_NAME }}-amd64 \
            etendo/etendo_ui:${{ env.BRANCH_NAME }}-arm64
